services:
  workspace:
    image: boilerplate-compile-rust:stable
    build:
      context: ./docker
      dockerfile: Dockerfile
    init: true
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      CARGO_TARGET_DIR: /workspace/target
      CARGO_TERM_COLOR: always
    volumes:
      - source:/workspace
      - target:/workspace/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    ports:
      - "127.0.0.1:${REMOTE_PORT}:${APP_PORT}"
    mem_limit: 300m
    memswap_limit: 768m
    cpus: "0.50"
    environment:
      CARGO_BUILD_JOBS: "1"
    labels:
      com.boilerplate-compile.managed: "true"
      com.boilerplate-compile.project: "${PROJECT_ID}"

volumes:
  source:
    labels:
      com.boilerplate-compile.managed: "true"
      com.boilerplate-compile.project: "${PROJECT_ID}"
  target:
    labels:
      com.boilerplate-compile.managed: "true"
      com.boilerplate-compile.project: "${PROJECT_ID}"
  cargo_registry:
    external: true
    name: boilerplate-compile-cargo-registry
  cargo_git:
    external: true
    name: boilerplate-compile-cargo-git

networks:
  default:
    labels:
      com.boilerplate-compile.managed: "true"
      com.boilerplate-compile.project: "${PROJECT_ID}"
